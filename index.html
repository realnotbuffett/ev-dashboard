<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EV Bots — Dashboard</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EV Bots">
<meta name="theme-color" content="#06090f">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #06090f;
    --bg-card: #0d1117;
    --border: #1b2332;
    --border-bright: #253045;
    --text-primary: #e2e8f0;
    --text-secondary: #8892a4;
    --text-dim: #4a5568;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --orange: #f97316;
    --purple: #a855f7;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(249,115,22,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ---- Top Bar ---- */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .top-bar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--orange), var(--purple));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 800; color: white;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -1px;
  }
  .top-bar h1 {
    font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
  }
  .top-bar h1 span {
    color: var(--text-secondary); font-weight: 400; font-size: 14px; margin-left: 6px;
  }

  /* ---- Tab Bar ---- */
  .tab-bar {
    display: flex;
    gap: 0;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .tab:hover { color: var(--text-secondary); }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--orange); }

  .tab-icon {
    font-size: 18px;
  }
  .tab-status {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .tab-status.online { background: var(--green); animation: pulse 2s ease-in-out infinite; }
  .tab-status.dryrun { background: var(--amber); animation: pulse 2s ease-in-out infinite; }
  .tab-status.offline { background: var(--red); }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }

  /* ---- Iframe Container ---- */
  .frame-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .frame-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    background: var(--bg-primary);
    display: none;
  }
  .frame-container iframe.active { display: block; }

  /* ---- Loading Overlay ---- */
  .loading-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    z-index: 10;
    transition: opacity 0.3s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-text {
    font-size: 14px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ---- Mobile ---- */
  @media (max-width: 500px) {
    .top-bar { padding: 10px 14px; }
    .top-bar h1 { font-size: 17px; }
    .top-bar h1 span { display: none; }
    .tab-bar { padding: 0 10px; }
    .tab { padding: 12px 16px; font-size: 13px; }
    .logo { width: 32px; height: 32px; font-size: 13px; }
  }

  /* ---- iPhone home screen safe areas ---- */
  @supports (padding-top: env(safe-area-inset-top)) {
    .top-bar { padding-top: calc(12px + env(safe-area-inset-top)); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="logo">EV</div>
      <h1>EV Bots <span>Dashboard Hub</span></h1>
    </div>
  </div>

  <div class="tab-bar" id="tabBar">
    <div class="tab active" data-bot="nhl" onclick="switchTab('nhl')">
      <span class="tab-icon">&#127954;</span>
      <span>NHL</span>
      <span class="tab-status" id="status-nhl"></span>
    </div>
    <div class="tab" data-bot="mlb" onclick="switchTab('mlb')">
      <span class="tab-icon">&#9918;</span>
      <span>MLB</span>
      <span class="tab-status" id="status-mlb"></span>
    </div>
    <div class="tab" data-bot="nba" onclick="switchTab('nba')">
      <span class="tab-icon">&#127936;</span>
      <span>NBA</span>
      <span class="tab-status" id="status-nba"></span>
    </div>
  </div>

  <div class="frame-container" id="frameContainer">
    <div class="loading-overlay" id="loadingOverlay">
      <span class="loading-text">Loading dashboard...</span>
    </div>
    <iframe id="frame-nhl" class="active" src="https://realnotbuffett.github.io/nhl-ev-v2-dashboard/"></iframe>
    <iframe id="frame-mlb" src="https://realnotbuffett.github.io/mlb-ev-dashboard/"></iframe>
    <iframe id="frame-nba" src="https://realnotbuffett.github.io/nba-ev-dashboard/"></iframe>
  </div>
</div>

<script>
let currentTab = 'nhl';

function switchTab(bot) {
  if (bot === currentTab) return;
  currentTab = bot;

  // Update tab styles
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.bot === bot);
  });

  // Show correct iframe
  document.querySelectorAll('.frame-container iframe').forEach(f => {
    f.classList.toggle('active', f.id === 'frame-' + bot);
  });
}

// Check each bot's status by fetching data.json
const BOTS = {
  nhl: 'https://realnotbuffett.github.io/nhl-ev-v2-dashboard/data.json',
  mlb: 'https://realnotbuffett.github.io/mlb-ev-dashboard/data.json',
  nba: 'https://realnotbuffett.github.io/nba-ev-dashboard/data.json',
};

async function checkStatuses() {
  for (const [bot, url] of Object.entries(BOTS)) {
    const dot = document.getElementById('status-' + bot);
    try {
      const resp = await fetch(url + '?t=' + Date.now());
      if (!resp.ok) throw new Error();
      const data = await resp.json();
      const lastUpdated = data.last_updated;
      const isDryRun = data.mode === 'DRY RUN';

      if (!lastUpdated) {
        dot.className = 'tab-status offline';
      } else if (isDryRun) {
        dot.className = 'tab-status dryrun';
      } else {
        const age = (Date.now() - new Date(lastUpdated).getTime()) / 1000 / 60;
        dot.className = 'tab-status ' + (age < 20 ? 'online' : 'offline');
      }
    } catch {
      dot.className = 'tab-status offline';
    }
  }
}

// Hide loading overlay once first iframe loads
document.getElementById('frame-nhl').addEventListener('load', () => {
  document.getElementById('loadingOverlay').classList.add('hidden');
});

// Check statuses on load and every 5 minutes
checkStatuses();
setInterval(checkStatuses, 5 * 60 * 1000);
</script>
</body>
</html>
